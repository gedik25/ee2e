name: ee2e

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ee2e-app:dev
    container_name: ee2e-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ee2e:${POSTGRES_PASSWORD}@db:5432/ee2e
    ports:
      - "5050:5000"
    networks:
      - ee2e-net
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    container_name: ee2e-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ee2e
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ee2e
    expose:
      - "5432"
    networks:
      - ee2e-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ee2e -d ee2e"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  ee2e-net:
    driver: bridge

volumes:
  postgres-data:
